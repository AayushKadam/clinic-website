<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book an Appointment | Aura Maternity & Pediatrics Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- SHARED HEADER -->
  <clinic-header></clinic-header>


  <!-- PAGE BANNER -->
  <section class="page-banner">
    <div class="container">
      <span class="sub-heading">Book an Appointment</span>
      <p>Just drop us a message through WhatsApp and we'll get back to you as soon as possible.</p>
    </div>
  </section>

  <!-- BOOKING LAYOUT SECTION -->
  <section class="booking-section section-padding bg-light" id="booking">
    <div class="container">
      <div class="booking-layout">

        <!-- WhatsApp Front Desk Card -->
        <div class="whatsapp-action-card">
          <div class="whatsapp-card-content">
            <div class="whatsapp-icon-large">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-whatsapp"
                viewBox="0 0 16 16">
                <path
                  d="M13.601 2.326A7.854 7.854 0 0 0 .79 10.394l.048.37-.63 2.33 2.385-.626.37.048a7.813 7.813 0 0 0 3.748.977h.001c4.32 0 7.831-3.51 7.831-7.83A7.83 7.83 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-1.42.372.38-1.4-.158-.25a6.56 6.56 0 0 1-1.005-3.493c0-3.625 2.95-6.57 6.57-6.57a6.57 6.57 0 0 1 6.57 6.57c0 3.626-2.95 6.579-6.57 6.579zm3.557-4.877c-.19-.094-1.121-.553-1.295-.615-.173-.063-.3-.094-.427.094-.127.188-.49.613-.6.729-.11.117-.22.13-.41.035-.19-.094-.8-.296-1.523-.941-.563-.5-1.01-1.119-1.12-1.309-.11-.19-.013-.292.08-.387.085-.085.19-.22.285-.33.095-.11.127-.188.19-.312.063-.125.03-.235-.015-.33-.045-.094-.427-1.03-.586-1.416-.154-.373-.306-.322-.427-.328-.11-.006-.239-.006-.367-.006-.128 0-.335.048-.51.235-.175.188-.67.654-.67 1.595 0 .942.684 1.85.779 1.978.095.13 1.343 2.051 3.254 2.878.455.197.81.315 1.086.402.457.145.874.125 1.205.076.368-.055 1.121-.459 1.279-.902.158-.444.158-.825.11-.902-.045-.078-.174-.125-.364-.219z" />
              </svg>
            </div>
            <span class="whatsapp-badge">Instant Booking</span>
            <h3>WhatsApp Front Desk</h3>
            <p class="whatsapp-text">Skip the forms entirely. Select the appropriate clinical desk below to text our
              front team and secure slots instantly.</p>

            <div class="phone-input-group">
              <label for="whatsapp-desk">Select Specialty Desk:</label>
              <select id="whatsapp-desk" class="desk-select">
                <option value="+918824595243">Front Desk (+91 88245 95243)</option>
              </select>
            </div>

            <!-- Pre-filled message target template: https://wa.me/YOUR_PHONE_NUMBER?text=Hello%21%20I%20would%20like%20to%20book%20an%20appointment%20at%20the%20clinic.%20Please%20let%20me%20know%20the%20available%20slots. -->
            <a href="https://wa.me/+918824595243?text=Hello%21%20I%20would%20like%20to%20book%20an%20appointment%20at%20the%20clinic.%20Please%20let%20me%20know%20the%20available%20slots."
              id="whatsapp-btn" class="btn-whatsapp" target="_blank" rel="noopener noreferrer">
              Chat with Front Desk
            </a>
          </div>
          <div class="whatsapp-card-background"></div>
        </div>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <clinic-footer></clinic-footer>

  <script src="header.js" defer></script>
  <script src="footer.js" defer></script>
  <script src="app.js"></script>
</body>

</html>
